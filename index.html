<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCID BIBLE | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a0b0d; --glass: rgba(255, 255, 255, 0.08); --gold: #c5a059; --gold-light: #e2c285; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVEGAÇÃO */
        .nav-header { background: #0f1014; border-bottom: 1px solid var(--glass); padding: 12px 5px; z-index: 100; }
        .nav-tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 1000px; margin: 0 auto; }
        .tab-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px 1px; border-radius: 10px; font-size: 9px; font-weight: 600; text-transform: uppercase; text-align: center; cursor: pointer; border: none; }
        .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        /* BOTÃO FLUTUANTE APK */
        .btn-fixo-home { position: fixed; bottom: 25px; right: 20px; width: 65px; height: 65px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; z-index: 99999; border: 3px solid #000; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.8); cursor: pointer; }

        .content-wrapper { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 18px; overflow-y: auto; }
        .view-section.active { display: flex; }

        /* CARDS */
        .card { background: var(--glass); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); width: 100%; backdrop-filter: blur(12px); margin-bottom: 15px; }
        .action-btn { background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; padding: 16px; border-radius: 16px; font-weight: bold; color: #000; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 14px; }

        /* EDITOR E TOOLBAR */
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .tool-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 8px 22px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .tool-btn.active { background: var(--gold) !important; color: #000 !important; box-shadow: 0 0 15px var(--gold); }
        
        #sermon-editor { width: 100%; min-height: 280px; background: #15161a; color: white; border: 1px solid var(--glass); border-radius: 18px; padding: 18px; font-size: 16px; outline: none; border-left: 5px solid var(--gold); overflow-y: auto; text-align: left; line-height: 1.5; }

        /* BOTÕES DE ESBOÇOS SALVOS */
        .sermon-actions-row { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-sermon { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 20px; }
        #reader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100000; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="btn-fixo-home" onclick="switchView('home', document.querySelectorAll('.tab-btn')[0])">INÍCIO<br>APP</div>

    <header class="nav-header">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchView('home', this)">Home</button>
            <button class="tab-btn" onclick="switchView('leitura', this)">Bíblia</button>
            <button class="tab-btn" onclick="switchView('esboços', this)">Esboços</button>
            <button class="tab-btn" onclick="switchView('materiais', this)">PDFs</button>
            <button class="tab-btn" onclick="switchView('estudos', this)">CACP</button>
        </div>
    </header>

    <main class="content-wrapper">
        <section id="view-home" class="view-section active">
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div class="card" style="text-align:center;">
                    <h2 style="color:var(--gold); font-weight:800; font-size: 26px;">RCID BIBLE PRO</h2>
                    <button class="action-btn" style="margin-top:20px;" onclick="switchView('leitura', document.querySelectorAll('.tab-btn')[1])">📖 ABRIR BÍBLIA ONLINE</button>
                </div>
                <div class="card" style="text-align:center;">
                    <button class="action-btn" style="background:#28a745; color:white;" onclick="switchView('agenda', document.querySelectorAll('.tab-btn')[0])">📅 MINHA AGENDA</button>
                </div>
                <div class="card" style="border:1px dashed var(--gold); text-align:center;">
                    <button class="action-btn" style="background:#009ee3; color:white;" onclick="window.open('https://mpago.la/126sWfx', '_blank')">🤝 OFERTAR</button>
                    <p style="font-size:12px; color:#aaa; font-style:italic; margin-top:15px; line-height: 1.4;">
                        "Este projeto é totalmente gratuito para abençoar sua vida e ministério. Se você sente no coração o desejo de apoiar esta obra, clique no botão acima para realizar uma oferta voluntária."
                    </p>
                </div>
            </div>
        </section>

        <section id="view-esboços" class="view-section">
            <div class="card">
                <input type="text" id="sermon-title" style="width:100%; background:#15161a; color:var(--gold); border:1px solid var(--glass); padding:15px; border-radius:12px; margin-bottom:12px; outline:none;" placeholder="Título">
                <div class="toolbar">
                    <button id="btn-bold" class="tool-btn" onclick="execCmd('bold')">B</button>
                    <button id="btn-italic" class="tool-btn" style="font-style:italic;" onclick="execCmd('italic')">I</button>
                </div>
                <div id="sermon-editor" contenteditable="true" onfocus="checkActiveStyles()"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="action-btn" style="flex:1;" onclick="saveSermon()">SALVAR</button>
                    <button class="action-btn" style="flex:1; background:#333; color:white;" onclick="clearEditor()">NOVO</button>
                </div>
            </div>
            <div id="saved-list"></div>
        </section>

        <section id="view-materiais" class="view-section">
            <div class="card">
                <h3 style="color:var(--gold); margin-bottom:15px; text-align:center;">História da Igreja (Série Completa)</h3>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1ukE1_cJNNSKFI4VBiwCdLesm6oRT3weu', '_blank')">📖 Volume 1</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1WnHrDLZ6ZKKmVidTwuzZ_HPOroEup0Us', '_blank')">📖 Volume 2</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1AvZtXGybmuEvqHUdtCuhnPzxbRyanDfe', '_blank')">📖 Volume 3</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=18-r2qE1eDnF_Rh7CfrYoFSqG4RgQhUMM', '_blank')">📖 Volume 4</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1UriFN9nzlOH29TSawHyXpvDu3Bb4gYhY', '_blank')">📖 Volume 5</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1OWCuZLG_bf5kdivV_7vBAU5lshPtkWEX', '_blank')">📖 Volume 6</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=172-WF-dXVokihZE1Sgcj4-1DRO5CjHiI', '_blank')">📖 Volume 7</button>
            </div>
            <div class="card">
                <h3 style="color:var(--gold); margin-bottom:10px; text-align:center;">Outros Materiais</h3>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="window.open('https://drive.google.com/uc?export=view&id=1j7Q-LS22Rxhw7-28UlaYdj8r2BS-Myb0', '_blank')">🌍 Geografia Bíblica</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left;" onclick="window.open('https://drive.google.com/uc?export=view&id=1fT8KxG1D61_eLdghn06u4nUCjRqlr9Uf', '_blank')">📖 Mil Esboços para Pregadores</button>
            </div>
        </section>

        <section id="view-agenda" class="view-section">
            <div class="card">
                <h3 style="color:var(--gold); margin-bottom:15px; text-align:center;">Agenda Ministerial</h3>
                <input type="date" id="agenda-date" style="width:100%; background:#15161a; color:white; border:1px solid var(--gold); padding:12px; border-radius:10px; margin-bottom:10px;">
                <input type="text" id="agenda-text" style="width:100%; background:#15161a; color:white; border:1px solid var(--gold); padding:12px; border-radius:10px; margin-bottom:10px;" placeholder="O que agendar?">
                <button class="action-btn" onclick="saveAgenda()">SALVAR COMPROMISSO</button>
            </div>
            <div id="agenda-list"></div>
        </section>

        <section id="view-leitura" class="view-section" style="padding:10px;"><iframe src="https://www.bibliaonline.com.br/acf/"></iframe></section>

        <section id="view-estudos" class="view-section">
            <div class="card" style="text-align:center;">
                <input type="text" id="inputSeita" style="width:100%; background:#15161a; color:white; border:1px solid var(--gold); padding:15px; border-radius:12px; margin-bottom:12px;" placeholder="Pesquisar Seita...">
                <button class="action-btn" onclick="window.open('https://www.cacp.app.br/?s=' + document.getElementById('inputSeita').value, '_blank')">BUSCAR CACP</button>
            </div>
        </section>
    </main>

    <div id="reader-overlay">
        <button style="background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:bold; width:100%; margin-bottom:20px; color:#000;" onclick="closeReader()">FECHAR LEITURA</button>
        <h2 id="reader-title" style="color: var(--gold); text-align:center; margin-bottom:10px;"></h2>
        <div id="reader-content" style="font-size:22px; line-height:1.6; color:#fff;"></div>
    </div>

    <script>
        function switchView(id, btn) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        function execCmd(cmd) {
            document.execCommand(cmd, false, null);
            document.getElementById('sermon-editor').focus();
            checkActiveStyles();
        }

        function checkActiveStyles() {
            document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
            document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));
        }

        document.getElementById('sermon-editor').addEventListener('keyup', checkActiveStyles);
        document.getElementById('sermon-editor').addEventListener('click', checkActiveStyles);

        function saveAgenda() {
            const date = document.getElementById('agenda-date').value;
            const text = document.getElementById('agenda-text').value;
            if(!date || !text) return;
            localStorage.setItem('rcid_agenda_'+new Date().getTime(), JSON.stringify({date, text, done:false}));
            document.getElementById('agenda-date').value = ""; document.getElementById('agenda-text').value = "";
            loadAgenda();
        }

        function loadAgenda() {
            const list = document.getElementById('agenda-list'); list.innerHTML = ""; let items = [];
            for (let i=0; i<localStorage.length; i++) {
                const k = localStorage.key(i); if(k.startsWith('rcid_agenda_')) items.push({k, ...JSON.parse(localStorage.getItem(k))});
            }
            items.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(it => {
                const item = document.createElement('div'); item.className = 'card' + (it.done?' agenda-done':'');
                item.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${it.date.split('-').reverse().join('/')}</strong><br>${it.text}</div>
                    <div style="display:flex; gap:5px;"><button style="background:#28a745; width:35px; height:35px; border-radius:8px; border:none; color:#fff;" onclick="toggleAgenda('${it.k}')">✓</button>
                    <button style="background:red; width:35px; height:35px; border-radius:8px; border:none; color:#fff;" onclick="deleteAgenda('${it.k}')">X</button></div></div>`;
                list.appendChild(item);
            });
        }
        function toggleAgenda(k) { const d = JSON.parse(localStorage.getItem(k)); d.done = !d.done; localStorage.setItem(k, JSON.stringify(d)); loadAgenda(); }
        function deleteAgenda(k) { localStorage.removeItem(k); loadAgenda(); }

        function saveSermon() {
            const t = document.getElementById('sermon-title').value; const c = document.getElementById('sermon-editor').innerHTML;
            if(!t || c==="") return;
            localStorage.setItem('rcid_sermon_'+t, JSON.stringify({title:t, content:c}));
            clearEditor(); loadSermons();
        }
        function clearEditor() { document.getElementById('sermon-title').value = ""; document.getElementById('sermon-editor').innerHTML = ""; checkActiveStyles(); }
        function loadSermons() {
            const list = document.getElementById('saved-list'); list.innerHTML = "<h4 style='color:var(--gold); margin: 15px 0 10px 5px;'>Meus Esboços:</h4>";
            for (let i=0; i<localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('rcid_sermon_')) {
                    const d = JSON.parse(localStorage.getItem(k)); const item = document.createElement('div'); item.className = 'card';
                    item.innerHTML = `<strong>${d.title}</strong><div class="sermon-actions-row">
                        <button class="btn-sermon" style="background:var(--gold); color:#000;" onclick="openReader('${k}')">📖 LER</button>
                        <button class="btn-sermon" style="background:#009ee3; color:#fff;" onclick="editSermon('${k}')">✍️ EDIT</button>
                        <button class="btn-sermon" style="background:red; color:#fff;" onclick="deleteSermon('${k}')">🗑️ X</button></div>`;
                    list.appendChild(item);
                }
            }
        }
        function openReader(k) { const d = JSON.parse(localStorage.getItem(k)); document.getElementById('reader-title').innerText = d.title; document.getElementById('reader-content').innerHTML = d.content; document.getElementById('reader-overlay').style.display = 'flex'; }
        function closeReader() { document.getElementById('reader-overlay').style.display = 'none'; }
        function editSermon(k) { const d = JSON.parse(localStorage.getItem(k)); document.getElementById('sermon-title').value = d.title; document.getElementById('sermon-editor').innerHTML = d.content; switchView('esboços', document.querySelectorAll('.tab-btn')[2]); window.scrollTo(0,0); checkActiveStyles(); }
        function deleteSermon(k) { if(confirm("Apagar?")) { localStorage.removeItem(k); loadSermons(); } }

        window.onload = function() { loadSermons(); loadAgenda(); };
    </script>
</body>
</html>
