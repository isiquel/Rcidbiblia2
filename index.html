
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RCID BIBLE | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0a0b0d; --glass: rgba(255, 255, 255, 0.08); --gold: #c5a059; --gold-light: #e2c285; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* BOTÃO MESTRE - ESTE É O SEGREDO DO APK */
        .btn-apk-home { 
            position: fixed; bottom: 25px; right: 20px; width: 65px; height: 65px; 
            background: linear-gradient(135deg, var(--gold), var(--gold-light)); 
            color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 10px; z-index: 1000000; border: 3px solid #000; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.8); cursor: pointer; line-height: 1.1;
        }

        .nav-header { background: #0f1014; border-bottom: 1px solid var(--glass); padding: 10px 5px; z-index: 1000; }
        .nav-tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 1000px; margin: 0 auto; }
        .tab-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px 1px; border-radius: 8px; font-size: 8px; font-weight: 600; text-transform: uppercase; text-align: center; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; }

        .content-wrapper { flex: 1; position: relative; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 15px; overflow-y: auto; }
        .view-section.active { display: flex; }

        .card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .action-btn { background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; padding: 15px; border-radius: 12px; font-weight: bold; color: #000; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 13px; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .tool-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .tool-btn.active { background: var(--gold) !important; color: #000 !important; box-shadow: 0 0 10px var(--gold); }
        
        #sermon-editor { width: 100%; min-height: 250px; background: #15161a; color: white; border: 1px solid var(--glass); border-radius: 15px; padding: 15px; font-size: 16px; outline: none; border-left: 5px solid var(--gold); overflow-y: auto; text-align: left; }

        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="btn-apk-home" onclick="location.reload();">INÍCIO<br>APP</div>

    <header class="nav-header">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchView('home', this)">Home</button>
            <button class="tab-btn" onclick="switchView('leitura', this)">Bíblia</button>
            <button class="tab-btn" onclick="switchView('esboços', this)">Esboços</button>
            <button class="tab-btn" onclick="switchView('materiais', this)">PDFs</button>
            <button class="tab-btn" onclick="switchView('estudos', this)">CACP</button>
        </div>
    </header>

    <main class="content-wrapper">
        <section id="view-home" class="view-section active">
            <div class="card" style="text-align:center;">
                <h2 style="color:var(--gold); font-weight:800;">RCID BIBLE PRO</h2>
                <button class="action-btn" style="margin-top:15px;" onclick="switchView('leitura', document.querySelectorAll('.tab-btn')[1])">📖 ABRIR BÍBLIA</button>
            </div>
            <div class="card" style="text-align:center;">
                <button class="action-btn" style="background:#28a745; color:white;" onclick="switchView('agenda', document.querySelectorAll('.tab-btn')[0])">📅 MINHA AGENDA</button>
            </div>
            <div class="card" style="border:1px dashed var(--gold); text-align:center;">
                <button class="action-btn" style="background:#009ee3; color:white;" onclick="window.open('https://mpago.la/126sWfx', '_blank')">🤝 OFERTAR</button>
                <p style="font-size:11px; color:#aaa; margin-top:10px; font-style:italic;">"Projeto grátis. Se sentir no coração o desejo de apoiar, sua oferta é bem-vinda."</p>
            </div>
        </section>

        <section id="view-agenda" class="view-section">
            <div class="card">
                <input type="date" id="agenda-date" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#15161a; color:white; border:1px solid var(--gold);">
                <input type="text" id="agenda-text" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; background:#15161a; color:white; border:1px solid var(--gold);" placeholder="Compromisso...">
                <button class="action-btn" onclick="saveAgenda()">SALVAR</button>
            </div>
            <div id="agenda-list"></div>
        </section>

        <section id="view-leitura" class="view-section" style="padding:0;">
            <iframe src="https://www.bibliaonline.com.br/acf/"></iframe>
        </section>

        <section id="view-esboços" class="view-section">
            <div class="card">
                <input type="text" id="sermon-title" style="width:100%; background:#15161a; color:var(--gold); border:1px solid var(--glass); padding:15px; border-radius:12px; margin-bottom:10px;" placeholder="Título">
                <div class="toolbar">
                    <button id="btn-bold" class="tool-btn" onclick="execCmd('bold')">B</button>
                    <button id="btn-italic" class="tool-btn" style="font-style:italic;" onclick="execCmd('italic')">I</button>
                </div>
                <div id="sermon-editor" contenteditable="true" oninput="checkStyles()" onclick="checkStyles()"></div>
                <button class="action-btn" style="margin-top:10px;" onclick="saveSermon()">SALVAR</button>
            </div>
            <div id="saved-list"></div>
        </section>

        <section id="view-estudos" class="view-section">
            <div class="card" style="margin-top:10px;">
                <input type="text" id="inputSeita" style="width:100%; padding:15px; border-radius:12px; background:#15161a; color:white; border:1px solid var(--gold);" placeholder="Pesquisar seita...">
                <button class="action-btn" style="margin-top:10px;" onclick="window.location.href='https://www.cacp.app.br/?s=' + document.getElementById('inputSeita').value">🔍 BUSCAR NO CACP</button>
            </div>
        </section>

        <section id="view-materiais" class="view-section">
            <div class="card">
                <h3 style="color:var(--gold); margin-bottom:10px; text-align:center;">História da Igreja (7 Vols)</h3>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1ukE1_cJNNSKFI4VBiwCdLesm6oRT3weu')">📖 Volume 1</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1WnHrDLZ6ZKKmVidTwuzZ_HPOroEup0Us')">📖 Volume 2</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1AvZtXGybmuEvqHUdtCuhnPzxbRyanDfe')">📖 Volume 3</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('18-r2qE1eDnF_Rh7CfrYoFSqG4RgQhUMM')">📖 Volume 4</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1UriFN9nzlOH29TSawHyXpvDu3Bb4gYhY')">📖 Volume 5</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1OWCuZLG_bf5kdivV_7vBAU5lshPtkWEX')">📖 Volume 6</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('172-WF-dXVokihZE1Sgcj4-1DRO5CjHiI')">📖 Volume 7</button>
            </div>
            <div class="card">
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left; margin-bottom:8px;" onclick="openPDF('1j7Q-LS22Rxhw7-28UlaYdj8r2BS-Myb0')">🌍 Geografia Bíblica</button>
                <button class="action-btn" style="background:rgba(255,255,255,0.05); color:var(--gold-light); text-align:left;" onclick="openPDF('1fT8KxG1D61_eLdghn06u4nUCjRqlr9Uf')">📜 Mil Esboços para Pregadores</button>
            </div>
        </section>
    </main>

    <script>
        function switchView(id, btn) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        // FUNÇÃO DE PDF MELHORADA PARA APK
        function openPDF(id) {
            const url = "https://docs.google.com/viewer?embedded=true&url=https://drive.google.com/uc?id=" + id;
            window.location.href = url;
        }

        function execCmd(cmd) { document.execCommand(cmd, false, null); checkStyles(); }
        function checkStyles() {
            document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
            document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));
        }

        // AGENDA
        function saveAgenda() {
            const date = document.getElementById('agenda-date').value;
            const text = document.getElementById('agenda-text').value;
            if(!date || !text) return;
            localStorage.setItem('rcid_agenda_'+new Date().getTime(), JSON.stringify({date, text, done:false}));
            document.getElementById('agenda-date').value = ""; document.getElementById('agenda-text').value = ""; loadAgenda();
        }

        function loadAgenda() {
            const list = document.getElementById('agenda-list'); list.innerHTML = ""; let items = [];
            for (let i=0; i<localStorage.length; i++) {
                const k = localStorage.key(i); if(k.startsWith('rcid_agenda_')) items.push({k, ...JSON.parse(localStorage.getItem(k))});
            }
            items.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(it => {
                const item = document.createElement('div'); item.className = 'card';
                item.innerHTML = `<div><strong>${it.date.split('-').reverse().join('/')}</strong><br>${it.text}</div>`;
                list.appendChild(item);
            });
        }

        // ESBOÇOS
        function saveSermon() {
            const t = document.getElementById('sermon-title').value;
            const c = document.getElementById('sermon-editor').innerHTML;
            if(!t || c==="") return;
            localStorage.setItem('rcid_sermon_'+t, JSON.stringify({title:t, content:c}));
            alert("Salvo!"); loadSermons();
        }

        function loadSermons() {
            const list = document.getElementById('saved-list'); list.innerHTML = "";
            for (let i=0; i<localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('rcid_sermon_')) {
                    const d = JSON.parse(localStorage.getItem(k));
                    const it = document.createElement('div'); it.className = 'card';
                    it.innerHTML = `<strong>${d.title}</strong><br><button onclick="deleteSermon('${k}')">Apagar</button>`;
                    list.appendChild(it);
                }
            }
        }
        function deleteSermon(k) { localStorage.removeItem(k); loadSermons(); }

        window.onload = function() { loadSermons(); loadAgenda(); };
    </script>
</body>
</html>
